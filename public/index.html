<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sistem irigații inteligente</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Sistem irigații inteligente</h1>
</header>

<div class="container">
    <nav class="sidebar">
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="grafice.html">Grafice senzori</a></li>
            <li><a href="istoric.html">Istoric date</a></li>
        </ul>
    </nav>

    <main class="content">
        <h2>Statistici Real-Time</h2>

        <div class="system-status-container">
            <div class="status-flex">
                <span class="status-badge" id="temp_status">⚪ Așteptare date...</span>
                <span class="status-badge" id="hum_status">⚪ Așteptare date...</span>
                <span class="status-badge" id="press_status">⚪ Așteptare date...</span>
                <span class="status-badge" id="light_status">⚪ Așteptare date...</span>
                <span class="status-badge" id="soil_status">⚪ Așteptare date...</span>
                <span class="status-badge" id="co2_status">⚪ Așteptare date...</span>
            </div>
        </div>

        <div class="sensor-grid-modern">
            <div class="card-modern"><span id="temp">-- °C</span></div>
            <div class="card-modern"><span id="hum">-- %</span></div>
            <div class="card-modern"><span id="press">-- hPa</span></div>
            <div class="card-modern"><span id="light">-- lux</span></div>
            <div class="card-modern"><span id="soil">-- %</span></div>
            <div class="card-modern"><span id="co2">-- ppm</span></div>
            <div class="card-modern"><span id="water">-- °C</span></div>
        </div>

        <div class="control-panel">
            <h3>Control Sistem</h3>

            <div class="btn-group">
                <button onclick="controlIrigation(1)">PORNEȘTE</button>
                <button onclick="controlIrigation(0)">OPREȘTE</button>
                <button onclick="setAuto()">AUTO</button>
            </div>

            <div>
                Stare: <span id="mode">AUTO</span>
            </div>
        </div>
    </main>
</div>

<script>
function format(val, unit) {
    if(val === null || val === undefined) return "-- " + unit;
    return val + " " + unit;
}

async function loadData() {
    try {
        const res = await fetch("https://iot-api-1-5qfd.onrender.com/data");
        const data = await res.json();
        if(!data.length) return;

        const d = data[0];

        document.getElementById("temp").innerText = format(d.temperature,"°C");
        document.getElementById("hum").innerText = format(d.humidity,"%");
        document.getElementById("press").innerText = format(d.pressure,"hPa");
        document.getElementById("light").innerText = format(d.illuminance,"lux");
        document.getElementById("soil").innerText = format(d.soil,"%");
        document.getElementById("co2").innerText = format(d.co2,"ppm");
        document.getElementById("water").innerText = format(d.water_temp,"°C");

        updateStatus(d);

    } catch(e) {
        console.log(e);
    }
}

function setStatus(id, ok) {
    const el = document.getElementById(id);
    el.innerText = ok ? "🟢 OK" : "🔴 PROBLEM";
}

function updateStatus(d) {
    setStatus("temp_status", !(d.temperature > 28));
    setStatus("hum_status", !(d.humidity < 40));
    setStatus("press_status", !(d.pressure < 1000));
    setStatus("light_status", !(d.illuminance < 25));
    setStatus("soil_status", !(d.soil < 35));
    setStatus("co2_status", !(d.co2 > 1000));
}

// 🔥 MANUAL CONTROL
async function controlIrigation(cmd) {
    await fetch("https://iot-api-1-5qfd.onrender.com/command", {
        method:"POST",
        headers:{ "Content-Type":"application/json"},
        body: JSON.stringify({command: cmd})
    });

    document.getElementById("mode").innerText = "MANUAL";
}

// 🔥 AUTO MODE
async function setAuto() {
    await fetch("https://iot-api-1-5qfd.onrender.com/auto", {
        method:"POST"
    });

    document.getElementById("mode").innerText = "AUTO";
}

loadData();
setInterval(loadData,5000);
</script>

</body>
</html>
