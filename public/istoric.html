<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Istoric date</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Sistem irigații inteligente</h1>
    </header>

    <div class="container">
        <nav class="sidebar">
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="grafice.html">Grafice senzori</a></li>
                <li><a href="istoric.html">Istoric date</a></li>
            </ul>
        </nav>

        <main class="content">
            <h2>Istoric date senzori</h2>

            <table class="history-table" id="historyTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Temp. Aer (°C)</th>
                        <th>Umid. Aer (%)</th>
                        <th>Presiune (hPa)</th>
                        <th>Lumină (lux)</th>
                        <th>CO2 (ppm)</th>
                        <th>Umid. Sol (%)</th>
                        <th>Temp. Apă (°C)</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </main>
    </div>

    <script>
        // Funcție helper pentru a afișa "-" dacă valoarea lipsește
        function formatValue(val, decimals = 1) {
            if (val === null || val === undefined) return "-";
            return typeof val === 'number' ? val.toFixed(decimals) : val;
        }

        async function loadHistory() {
            try {
                const res = await fetch("https://iot-api-1-5qfd.onrender.com/data");
                const data = await res.json();

                const table = document.querySelector("#historyTable tbody");
                table.innerHTML = "";

                data.forEach(row => {
                    let tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${new Date(row.created_at).toLocaleString('ro-RO')}</td>
                        <td>${formatValue(row.temperature)}</td>
                        <td>${formatValue(row.humidity)}</td>
                        <td>${formatValue(row.pressure, 0)}</td>
                        <td>${formatValue(row.illuminance, 0)}</td>
                        <td>${formatValue(row.co2, 0)}</td>
                        <td>${formatValue(row.soil, 0)}</td>
                        <td>${formatValue(row.water_temp)}</td>
                    `;

                    table.appendChild(tr);
                });

            } catch (err) {
                console.error("Eroare la încărcarea istoricului:", err);
            }
        }

        loadHistory();
        // Opțional: refresh automat la fiecare minut
        setInterval(loadHistory, 60000);
    </script>

</body>
</html>
