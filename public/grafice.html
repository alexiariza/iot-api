<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Grafice senzori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>
        <h1>Sistem irigații inteligente</h1>
    </header>

    <div class="container">
        <nav class="sidebar">
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="grafice.html">Grafice senzori</a></li>
                <li><a href="istoric.html">Istoric date</a></li>
            </ul>
        </nav>

        <main class="content">
            <div class="charts-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

                <div class="chart-box">
                    <h3>Temperatura Aer (°C)</h3>
                    <canvas id="tempChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Umiditate Aer (%)</h3>
                    <canvas id="humChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Presiune (hPa)</h3>
                    <canvas id="pressChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Lumină (Lux)</h3>
                    <canvas id="lightChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Umiditate Sol (%)</h3>
                    <canvas id="soilChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>CO2 (ppm)</h3>
                    <canvas id="co2Chart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Temperatura Apă (°C)</h3>
                    <canvas id="waterTempChart"></canvas>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Configurație de bază pentru a nu repeta codul
        const chartOptions = {
            type: 'line',
            data: { labels: [], datasets: [{ label: '', data: [], borderColor: '', tension: 0.3 }] },
            options: { responsive: true, scales: { y: { beginAtZero: false } } }
        };

        const tempChart = new Chart(document.getElementById("tempChart"), { ...chartOptions });
        tempChart.data.datasets[0].label = 'Temp Aer';
        tempChart.data.datasets[0].borderColor = 'red';

        const humChart = new Chart(document.getElementById("humChart"), { ...chartOptions });
        humChart.data.datasets[0].label = 'Umiditate';
        humChart.data.datasets[0].borderColor = 'blue';

        const pressChart = new Chart(document.getElementById("pressChart"), { ...chartOptions });
        pressChart.data.datasets[0].label = 'Presiune';
        pressChart.data.datasets[0].borderColor = 'green';

        const lightChart = new Chart(document.getElementById("lightChart"), { ...chartOptions });
        lightChart.data.datasets[0].label = 'Lumină';
        lightChart.data.datasets[0].borderColor = 'orange';

        // Inițializare grafice noi
        const soilChart = new Chart(document.getElementById("soilChart"), { ...chartOptions });
        soilChart.data.datasets[0].label = 'Umiditate Sol';
        soilChart.data.datasets[0].borderColor = 'brown';

        const co2Chart = new Chart(document.getElementById("co2Chart"), { ...chartOptions });
        co2Chart.data.datasets[0].label = 'CO2';
        co2Chart.data.datasets[0].borderColor = 'gray';

        const waterTempChart = new Chart(document.getElementById("waterTempChart"), { ...chartOptions });
        waterTempChart.data.datasets[0].label = 'Temp Apă';
        waterTempChart.data.datasets[0].borderColor = 'cyan';

        async function loadChart() {
            try {
                const res = await fetch("https://iot-api-1-5qfd.onrender.com/data");
                const data = await res.json();

                // FILTRARE: Am scos condițiile stricte. 
                // Acum luăm ultimele 30 de intrări indiferent dacă au unele valori null.
                const clean = data.slice(0, 30).reverse();

                let labels = [], temps = [], hums = [], press = [], light = [], soil = [], co2 = [], water = [];

                clean.forEach(row => {
                    labels.push(new Date(row.created_at).toLocaleTimeString());
                    
                    temps.push(row.temperature);
                    hums.push(row.humidity);
                    press.push(row.pressure);
                    light.push(row.illuminance);
                    soil.push(row.soil);
                    co2.push(row.co2);
                    water.push(row.water_temp);
                });

                // Update date
                tempChart.data.labels = labels; tempChart.data.datasets[0].data = temps;
                humChart.data.labels = labels; humChart.data.datasets[0].data = hums;
                pressChart.data.labels = labels; pressChart.data.datasets[0].data = press;
                lightChart.data.labels = labels; lightChart.data.datasets[0].data = light;
                soilChart.data.labels = labels; soilChart.data.datasets[0].data = soil;
                co2Chart.data.labels = labels; co2Chart.data.datasets[0].data = co2;
                waterTempChart.data.labels = labels; waterTempChart.data.datasets[0].data = water;

                // Update vizual
                tempChart.update(); humChart.update(); pressChart.update();
                lightChart.update(); soilChart.update(); co2Chart.update();
                waterTempChart.update();

            } catch (e) {
                console.error("Eroare grafice:", e);
            }
        }

        loadChart();
        setInterval(loadChart, 10000); // Actualizare la 10 secunde pentru a nu suprasolicita API-ul
    </script>

</body>
</html>
