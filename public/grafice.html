<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Grafice senzori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>
        <h1>Sistem irigații inteligente</h1>
    </header>

    <div class="container">
        <nav class="sidebar">
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="grafice.html">Grafice senzori</a></li>
                <li><a href="istoric.html">Istoric date</a></li>
            </ul>
        </nav>

        <main class="content">
            <div class="charts-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

                <div class="chart-box">
                    <h3>Temperatura Aer (°C)</h3>
                    <canvas id="tempChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Umiditate Aer (%)</h3>
                    <canvas id="humChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Presiune (hPa)</h3>
                    <canvas id="pressChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Lumină (Lux)</h3>
                    <canvas id="lightChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Umiditate Sol (%)</h3>
                    <canvas id="soilChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>CO2 (ppm)</h3>
                    <canvas id="co2Chart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Temperatura Apă (°C)</h3>
                    <canvas id="waterTempChart"></canvas>
                </div>

            </div>
        </main>
    </div>

    <script>
    // Configurație de bază
    const chartOptionsBase = {
        type: 'line',
        data: { labels: [], datasets: [{ label: '', data: [], borderColor: '', tension: 0.3 }] },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    };

    // Funcție pentru a crea o copie curată a configurației (fără a le amesteca)
    function createConfig(label, color) {
        let newConfig = JSON.parse(JSON.stringify(chartOptionsBase));
        newConfig.data.datasets[0].label = label;
        newConfig.data.datasets[0].borderColor = color;
        return newConfig;
    }

    // Inițializare grafice cu configurații INDEPENDENTE
    const tempChart = new Chart(document.getElementById("tempChart"), createConfig('Temp Aer', 'red'));
    const humChart = new Chart(document.getElementById("humChart"), createConfig('Umiditate', 'blue'));
    const pressChart = new Chart(document.getElementById("pressChart"), createConfig('Presiune', 'green'));
    const lightChart = new Chart(document.getElementById("lightChart"), createConfig('Lumină', 'orange'));
    const soilChart = new Chart(document.getElementById("soilChart"), createConfig('Umiditate Sol', 'brown'));
    const co2Chart = new Chart(document.getElementById("co2Chart"), createConfig('CO2', 'gray'));
    const waterTempChart = new Chart(document.getElementById("waterTempChart"), createConfig('Temp Apă', 'cyan'));

    async function loadChart() {
    try {
        const res = await fetch("https://iot-api-1-5qfd.onrender.com/data");
        const data = await res.json();

        const clean = data.slice(0, 30).reverse();

        let labels = [], temps = [], hums = [], press = [], light = [], soil = [], co2 = [], water = [];

        let last = {
            t: null, h: null, p: null, l: null, s: null, c: null, w: null
        };

        clean.forEach(row => {
            labels.push(new Date(row.created_at).toLocaleTimeString());

            if (row.temperature !== null) last.t = row.temperature;
            if (row.humidity !== null) last.h = row.humidity;
            if (row.pressure !== null) last.p = row.pressure;
            if (row.illuminance !== null) last.l = row.illuminance;
            if (row.soil !== null) last.s = row.soil;
            if (row.co2 !== null) last.c = row.co2;
            if (row.water_temp !== null) last.w = row.water_temp;

            temps.push(last.t);
            hums.push(last.h);
            press.push(last.p);
            light.push(last.l);
            soil.push(last.s);
            co2.push(last.c);
            water.push(last.w);
        });

        tempChart.data.labels = labels; tempChart.data.datasets[0].data = temps;
        humChart.data.labels = labels; humChart.data.datasets[0].data = hums;
        pressChart.data.labels = labels; pressChart.data.datasets[0].data = press;
        lightChart.data.labels = labels; lightChart.data.datasets[0].data = light;
        soilChart.data.labels = labels; soilChart.data.datasets[0].data = soil;
        co2Chart.data.labels = labels; co2Chart.data.datasets[0].data = co2;
        waterTempChart.data.labels = labels; waterTempChart.data.datasets[0].data = water;

        tempChart.update();
        humChart.update();
        pressChart.update();
        lightChart.update();
        soilChart.update();
        co2Chart.update();
        waterTempChart.update();

    } catch (e) {
        console.error("Eroare grafice:", e);
    }
}
    loadChart();
    setInterval(loadChart, 10000);
</script>

</body>
</html>
